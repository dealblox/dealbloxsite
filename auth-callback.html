<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Autenticando... — Deal Blox</title>
  <link rel="icon" href="/images/logo-dealblox.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:    #0a0d14; --bg2: #0f1320; --bg3: #141826;
      --cyan:  #06b6d4; --cyan2: #22d3ee;
      --blue:  #1d4ed8; --blue3: #3b82f6;
      --white: #f0f6ff; --text2: #8898aa; --text3: #4a5568;
      --green: #10b981; --red: #ef4444; --yellow: #f59e0b;
      --border2: rgba(99,179,237,.2);
      --grad-btn: linear-gradient(135deg,#1d4ed8,#06b6d4);
      --glow-b: 0 0 20px rgba(37,99,235,.5);
      --r2: 12px; --r3: 18px;
      --font: 'Space Grotesk', system-ui, sans-serif;
    }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--white);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
    }
    .cb-card {
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: var(--r3);
      padding: 48px 40px;
      width: 100%; max-width: 460px;
      text-align: center;
      box-shadow: 0 24px 80px rgba(0,0,0,.7);
      animation: fadeUp .4s ease both;
    }
    @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
    .cb-logo {
      width: 68px; height: 68px;
      background: var(--grad-btn);
      border-radius: var(--r2);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px;
      box-shadow: var(--glow-b);
      font-family: var(--font);
      font-size: 26px; font-weight: 900; color: white;
      letter-spacing: -2px;
    }
    .cb-spinner {
      width: 44px; height: 44px;
      border: 3px solid rgba(99,179,237,.15);
      border-top-color: var(--cyan);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin { to { transform:rotate(360deg); } }
    .cb-icon {
      width: 56px; height: 56px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px;
    }
    .cb-icon.success { background:rgba(16,185,129,.15); border:2px solid rgba(16,185,129,.4); }
    .cb-icon.error   { background:rgba(239,68,68,.12);  border:2px solid rgba(239,68,68,.3); }
    .cb-icon.warning { background:rgba(245,158,11,.12); border:2px solid rgba(245,158,11,.3); }
    .cb-title   { font-size:20px; font-weight:800; color:var(--white); margin-bottom:8px; }
    .cb-subtitle{ font-size:13px; color:var(--text2); line-height:1.6; margin-bottom:6px; }
    .cb-status  { font-size:12px; color:var(--text3); min-height:18px; margin-top:4px; }
    .cb-provider {
      display:inline-flex; align-items:center; gap:7px;
      font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.8px;
      padding:4px 14px; border-radius:20px; margin-bottom:20px;
    }
    .cb-provider.google  { background:rgba(234,67,53,.1);  color:#ea4335; border:1px solid rgba(234,67,53,.25); }
    .cb-provider.discord { background:rgba(88,101,242,.1); color:#7289da; border:1px solid rgba(88,101,242,.25); }
    .cb-btn {
      display:inline-flex; align-items:center; gap:8px;
      background:var(--grad-btn); color:#fff;
      border:none; border-radius:var(--r2);
      padding:11px 24px; font-size:14px; font-weight:700;
      cursor:pointer; font-family:var(--font);
      text-decoration:none; transition:opacity .2s; margin-top:16px;
    }
    .cb-btn:hover { opacity:.85; }
    .cb-btn.outline {
      background:transparent;
      border:1px solid rgba(99,179,237,.3);
      color:var(--cyan2); margin-left:8px;
    }
    .cb-steps {
      display:flex; flex-direction:column; gap:8px;
      margin:16px 0 4px; text-align:left;
    }
    .cb-step {
      display:flex; align-items:center; gap:10px;
      font-size:12px; color:var(--text3); transition:color .3s;
    }
    .cb-step.active { color:var(--cyan2); }
    .cb-step.done   { color:var(--green); }
    .cb-step-dot {
      width:8px; height:8px; border-radius:50%;
      background:var(--text3); flex-shrink:0; transition:background .3s;
    }
    .cb-step.active .cb-step-dot { background:var(--cyan2); animation:blink 1s ease-in-out infinite; }
    .cb-step.done   .cb-step-dot { background:var(--green); animation:none; }
    @keyframes blink { 0%,100%{opacity:1}50%{opacity:.3} }
    .cb-info-box {
      background:rgba(245,158,11,.08);
      border:1px solid rgba(245,158,11,.25);
      border-radius:10px; padding:14px 16px;
      font-size:12px; color:#fbbf24; line-height:1.6;
      margin-top:16px; text-align:left;
    }
    .cb-debug {
      background: rgba(239,68,68,.06);
      border: 1px solid rgba(239,68,68,.2);
      border-radius: 8px; padding: 10px 14px;
      font-size: 11px; color: var(--text2);
      margin-top: 12px; text-align: left;
      word-break: break-all; line-height: 1.7;
    }
    .cb-debug code { color: var(--cyan2); font-family: monospace; }
  </style>
</head>
<body>
  <div class="cb-card" id="cb-card">
    <!-- Logo LT -->
    <div class="cb-logo" id="cb-logo">LT</div>

    <!-- Provider chip -->
    <div id="cb-provider-chip"></div>

    <!-- Spinner -->
    <div class="cb-spinner" id="cb-spinner"></div>

    <!-- Textos -->
    <div class="cb-title" id="cb-title">Autenticando...</div>
    <div class="cb-subtitle" id="cb-subtitle">Por favor, aguarde um momento.</div>

    <!-- Steps -->
    <div class="cb-steps" id="cb-steps">
      <div class="cb-step active" id="step-token">
        <div class="cb-step-dot"></div><span>Verificando autorização...</span>
      </div>
      <div class="cb-step" id="step-user">
        <div class="cb-step-dot"></div><span>Buscando dados do usuário...</span>
      </div>
      <div class="cb-step" id="step-save">
        <div class="cb-step-dot"></div><span>Salvando sessão...</span>
      </div>
    </div>

    <div class="cb-status" id="cb-status"></div>
  </div>

  <script src="/js/config.js"></script>

  <script>
  // ── Auth mínimo ──────────────────────────────────────────────
  if (typeof Auth === 'undefined') {
    window.Auth = {
      STORAGE_KEY: "lagteck_user",
      setUser(u) {
        localStorage.setItem(this.STORAGE_KEY, JSON.stringify(u));
        window.dispatchEvent(new CustomEvent("lagteck:auth", { detail: u }));
      },
      getUser() {
        try { return JSON.parse(localStorage.getItem(this.STORAGE_KEY)) || null; } catch { return null; }
      }
    };
  }

  // ── API mínima (com tratamento de erro robusto) ──────────────
  if (typeof API === 'undefined') {
    window.API = {
      async get(t, p = {}) {
        const qs = new URLSearchParams(p).toString();
        const res = await fetch(`tables/${t}${qs ? "?" + qs : ""}`);
        if (!res.ok) throw new Error(`API GET ${t}: HTTP ${res.status}`);
        return res.json();
      },
      async post(t, d) {
        const res = await fetch(`tables/${t}`, {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify(d)
        });
        if (!res.ok) throw new Error(`API POST ${t}: HTTP ${res.status}`);
        return res.json();
      },
      async patch(t, id, d) {
        const res = await fetch(`tables/${t}/${id}`, {
          method: "PATCH", headers: { "Content-Type": "application/json" },
          body: JSON.stringify(d)
        });
        if (!res.ok) throw new Error(`API PATCH ${t}: HTTP ${res.status}`);
        return res.json();
      },
      async findUserByEmail(email) {
        try {
          const res = await this.get("users", { search: email, limit: 20 });
          return (res.data || []).find(u => u.email === email) || null;
        } catch { return null; }
      }
    };
  }

  // ── Helpers de UI ──────────────────────────────────────────
  function setStep(id, state) {
    const el = document.getElementById(id);
    if (!el) return;
    el.className = "cb-step " + (state === "error" ? "active" : state);
    const dot = el.querySelector(".cb-step-dot");
    if (!dot) return;
    if (state === "done")  { dot.style.background = "var(--green)";  dot.style.animation = "none"; }
    if (state === "error") { dot.style.background = "var(--red)";    dot.style.animation = "none"; }
  }
  function setStatus(msg) {
    const el = document.getElementById("cb-status");
    if (el) el.textContent = msg;
  }
  function hideSpinnerAndSteps() {
    const s = document.getElementById("cb-spinner");
    const st = document.getElementById("cb-steps");
    const lg = document.getElementById("cb-logo");
    if (s) s.style.display = "none";
    if (st) st.style.display = "none";
    if (lg) lg.style.display = "none";
  }
  function showStateIcon(type) {
    const colors = { success: "#10b981", error: "#ef4444", warning: "#f59e0b" };
    const c = colors[type] || colors.error;
    const paths = {
      success: `<polyline points="20 6 9 17 4 12"/>`,
      error:   `<circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>`,
      warning: `<path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>`,
    };
    // Remove ícone anterior se houver
    document.getElementById("cb-state-icon")?.remove();
    const html = `<div class="cb-icon ${type}" id="cb-state-icon">
      <svg width="26" height="26" fill="none" stroke="${c}" stroke-width="2.5" viewBox="0 0 24 24">${paths[type]}</svg>
    </div>`;
    const logo = document.getElementById("cb-logo");
    if (logo) logo.insertAdjacentHTML("afterend", html);
    else document.getElementById("cb-card").insertAdjacentHTML("afterbegin", html);
  }
  function showError(title, subtitle, detail = "", debugInfo = "") {
    hideSpinnerAndSteps();
    showStateIcon("error");
    document.getElementById("cb-title").textContent    = title;
    document.getElementById("cb-subtitle").textContent = subtitle;
    if (detail) setStatus(detail);

    // Debug box
    if (debugInfo) {
      const debugBox = document.createElement("div");
      debugBox.className = "cb-debug";
      debugBox.innerHTML = debugInfo;
      document.getElementById("cb-card").appendChild(debugBox);
    }

    const btn = document.createElement("a");
    btn.className = "cb-btn"; btn.href = "/";
    btn.innerHTML = `← Voltar ao início`;
    document.getElementById("cb-card").appendChild(btn);

    // Botão tentar novamente
    const retryBtn = document.createElement("a");
    retryBtn.className = "cb-btn outline"; retryBtn.href = "/";
    retryBtn.innerHTML = `🔑 Tentar login`;
    retryBtn.onclick = (e) => {
      e.preventDefault();
      window.location.href = "/?openLogin=1";
    };
    document.getElementById("cb-card").appendChild(retryBtn);
  }
  function showWarning(title, subtitle, infoHtml = "") {
    hideSpinnerAndSteps();
    showStateIcon("warning");
    document.getElementById("cb-title").textContent    = title;
    document.getElementById("cb-subtitle").textContent = subtitle;
    if (infoHtml) {
      const box = document.createElement("div");
      box.className = "cb-info-box";
      box.innerHTML = infoHtml;
      document.getElementById("cb-card").appendChild(box);
    }
    const btn = document.createElement("a");
    btn.className = "cb-btn"; btn.href = "/";
    btn.innerHTML = `← Voltar ao início`;
    document.getElementById("cb-card").appendChild(btn);
  }
  function showSuccess(name) {
    hideSpinnerAndSteps();
    showStateIcon("success");
    document.getElementById("cb-title").textContent    = `Bem-vindo, ${name}! 👋`;
    document.getElementById("cb-subtitle").textContent = "Login realizado com sucesso. Redirecionando...";
  }

  // ── Detecta parâmetros da URL ──────────────────────────────
  const urlSearch  = window.location.search;
  const urlHash    = window.location.hash;
  const params     = new URLSearchParams(urlSearch);
  const hashStr    = urlHash.replace(/^#/, "");
  const hashParams = new URLSearchParams(hashStr);

  const code  = params.get("code")  || "";
  const error = params.get("error") || "";

  // state: vem da query string (Discord/Google code flow) ou do hash (Google implicit)
  // Também tenta sessionStorage como fallback caso state não venha na URL
  const stateQ  = params.get("state")    || "";
  const stateH  = hashParams.get("state")|| "";
  const stateSS = sessionStorage.getItem("oauth_state") || "";
  const state   = stateQ || stateH || stateSS;

  // Google implicit flow: access_token vem no hash
  const accessTokenHash = hashParams.get("access_token") || "";

  // ── Chip do provider ───────────────────────────────────────
  const chipEl = document.getElementById("cb-provider-chip");
  const prov = (state === "google") ? "google" : (state === "discord") ? "discord" : "";
  if (prov === "google") {
    chipEl.innerHTML = `<div class="cb-provider google">
      <svg width="13" height="13" viewBox="0 0 24 24">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>Google</div>`;
  } else if (prov === "discord") {
    chipEl.innerHTML = `<div class="cb-provider discord">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor">
        <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/>
      </svg>Discord</div>`;
  }

  // ── Erro vindo do provider ─────────────────────────────────
  if (error) {
    const desc = params.get("error_description") || error;
    showError(
      "Autorização negada",
      "Você cancelou o login ou o acesso foi negado pelo provedor.",
      desc
    );
  } else {
    handleCallback();
  }

  // ── LÓGICA PRINCIPAL ───────────────────────────────────────
  async function handleCallback() {
    // CASO 1: Google implicit flow — access_token no hash
    if (accessTokenHash) {
      await handleGoogleImplicit(accessTokenHash);
      return;
    }

    // CASO 2: Authorization Code flow — code na query string
    if (code) {
      if (state === "google") {
        await handleGoogleCode(code);
      } else if (state === "discord") {
        await handleDiscordCode(code);
      } else {
        // State vazio mas temos code — tenta descobrir pelo código
        // Google codes geralmente começam com "4/" e são mais longos
        // Discord codes são alfanuméricos menores
        const looksLikeGoogle = code.startsWith("4/") || code.length > 50;
        if (looksLikeGoogle) {
          await handleGoogleCode(code);
        } else {
          await handleDiscordCode(code);
        }
      }
      return;
    }

    // CASO 3: Nenhum parâmetro válido
    showError(
      "Parâmetros inválidos",
      "Nenhum código de autorização foi recebido.",
      "",
      `URL recebida: <code>${window.location.href.replace(window.location.origin, "")}</code><br>
       State: <code>${state || "(vazio)"}</code><br>
       Code: <code>${code || "(vazio)"}</code><br>
       Token no hash: <code>${accessTokenHash ? "sim" : "não"}</code><br><br>
       Tente fazer login novamente. Se o problema persistir, verifique se o Google/Discord está configurado no <code>config.js</code>.`
    );
  }

  // ── Google: tenta backend, fallback para implicit ──────────
  async function handleGoogleCode(code) {
    const redirectUri = window.location.origin + "/auth-callback.html";
    setStep("step-token", "active");
    setStatus("Comunicando com servidor Google...");

    try {
      const res = await fetch("/api/auth/google", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ code, redirect_uri: redirectUri }),
        signal: AbortSignal.timeout(8000),
      });

      if (!res.ok) {
        throw new Error(`HTTP ${res.status}`);
      }

      const data = await res.json();
      if (data.error) throw new Error(data.error);

      setStep("step-token", "done");
      await finishLogin(data);
    } catch(err) {
      // Fallback: redireciona para fluxo implícito (token no hash)
      console.warn("[Google code] Backend falhou, redirecionando para implicit:", err.message);
      setStatus("Tentando método alternativo...");
      await new Promise(r => setTimeout(r, 600));
      redirectGoogleImplicit();
    }
  }

  // ── Google: busca dados com access_token diretamente ───────
  async function handleGoogleImplicit(accessToken) {
    setStep("step-token", "active");
    setStatus("Verificando token com Google...");
    try {
      const r = await fetch("https://www.googleapis.com/oauth2/v3/userinfo", {
        headers: { Authorization: `Bearer ${accessToken}` },
        signal: AbortSignal.timeout(12000)
      });
      if (!r.ok) {
        const errData = await r.json().catch(() => ({}));
        throw new Error(errData.error_description || `HTTP ${r.status}`);
      }
      const u = await r.json();
      if (!u.email) throw new Error("Email não retornado pelo Google");
      setStep("step-token", "done");
      await finishLogin({
        id:       u.sub,
        name:     u.name || u.given_name || u.email.split("@")[0],
        email:    u.email,
        avatar:   u.picture || "",
        provider: "google"
      });
    } catch(err) {
      console.error("[Google implicit]", err);
      showError(
        "Erro ao autenticar com Google",
        "Não foi possível verificar seu token. Tente novamente.",
        err.message
      );
    }
  }

  // ── Discord: tenta backend ─────────────────────────────────
  async function handleDiscordCode(code) {
    const redirectUri = window.location.origin + "/auth-callback.html";
    setStep("step-token", "active");
    setStatus("Comunicando com servidor Discord...");

    try {
      const res = await fetch("/api/auth/discord", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ code, redirect_uri: redirectUri }),
        signal: AbortSignal.timeout(10000),
      });

      if (!res.ok) {
        throw new Error(`HTTP ${res.status}`);
      }

      const data = await res.json();
      if (data.error) throw new Error(data.error);

      setStep("step-token", "done");
      await finishLogin(data);
    } catch(err) {
      console.warn("[Discord] Backend indisponível:", err.message);

      // Verifica se é ambiente de preview (não é o domínio real publicado)
      const isPreview = !["lagteck.xyz", "lagteck.vercel.app", "www.lagteck.xyz"]
        .includes(window.location.hostname);

      if (isPreview) {
        showWarning(
          "Discord requer deploy no Vercel",
          "O login com Discord funciona após publicar no servidor.",
          `<strong>ℹ️ Por que isso acontece?</strong><br>
           O Discord exige um servidor backend para processar o código de autorização.<br><br>
           <strong>✅ Solução:</strong> Clique em <em>Publish</em> para publicar no Vercel — o Discord funcionará automaticamente após o deploy.`
        );
      } else {
        showError(
          "Erro na autenticação Discord",
          "O servidor de autenticação está temporariamente indisponível.",
          err.message,
          `Erro: <code>${err.message}</code><br>Tente novamente em alguns instantes.`
        );
      }
    }
  }

  // ── Redireciona Google para fluxo implícito ────────────────
  function redirectGoogleImplicit() {
    const cfg = typeof LAGTECK_CONFIG !== "undefined" ? LAGTECK_CONFIG : {};
    const clientId = cfg.GOOGLE_CLIENT_ID || "";

    if (!clientId || clientId.includes("SEU_") || clientId.trim() === "") {
      showError(
        "Google Client ID não configurado",
        "Para ativar o login com Google, adicione o GOOGLE_CLIENT_ID no arquivo config.js.",
        "",
        `Edite <code>js/config.js</code> e preencha:<br><code>GOOGLE_CLIENT_ID: "seu-client-id.apps.googleusercontent.com"</code><br><br>
         Obtenha em: <a href="https://console.cloud.google.com/" target="_blank" style="color:var(--cyan2)">console.cloud.google.com</a>`
      );
      return;
    }

    sessionStorage.setItem("oauth_state", "google");
    const redirectUri = window.location.origin + "/auth-callback.html";
    const url = new URL("https://accounts.google.com/o/oauth2/v2/auth");
    url.searchParams.set("client_id",     clientId);
    url.searchParams.set("redirect_uri",  redirectUri);
    url.searchParams.set("response_type", "token");
    url.searchParams.set("scope",         "openid email profile");
    url.searchParams.set("state",         "google");
    url.searchParams.set("prompt",        "select_account");
    window.location.href = url.toString();
  }

  // ── Finaliza: busca/cria user no BD + salva sessão ─────────
  async function finishLogin(apiData) {
    setStep("step-user", "active");
    setStatus("Verificando conta...");

    const { id: oauthId, name, email, avatar, provider } = apiData;

    // Monta sessionUser imediato (fallback caso BD falhe)
    let sessionUser = {
      id:         oauthId || ("oauth_" + Date.now()),
      full_name:  name  || (email ? email.split("@")[0] : "Usuário"),
      email:      email || "",
      avatar_url: avatar || "",
      is_admin:   false,
      provider:   provider || "oauth",
    };

    // Tenta sincronizar com o banco (silencioso — não bloqueia login)
    try {
      let dbUser = await API.findUserByEmail(email);

      if (!dbUser) {
        setStatus("Criando sua conta...");
        try {
          dbUser = await API.post("users", {
            full_name:      name || (email ? email.split("@")[0] : "Usuário"),
            email:          email,
            password_hash:  "",
            email_verified: true,
            provider:       provider || "oauth",
            avatar_url:     avatar || "",
            is_admin:       false,
            favorites:      [],
            cart:           [],
          });
        } catch(createErr) {
          console.warn("[finishLogin] Não conseguiu criar usuário no BD:", createErr.message);
        }
      } else if (avatar && dbUser.avatar_url !== avatar) {
        API.patch("users", dbUser.id, { avatar_url: avatar }).catch(() => {});
        dbUser.avatar_url = avatar;
      }

      // Atualiza sessionUser com dados do banco
      if (dbUser && dbUser.id) {
        sessionUser = {
          id:         dbUser.id,
          full_name:  dbUser.full_name || name || "Usuário",
          email:      dbUser.email     || email || "",
          avatar_url: dbUser.avatar_url || avatar || "",
          is_admin:   dbUser.is_admin  || false,
          provider:   provider || "oauth",
        };
      }
    } catch(dbErr) {
      // BD falhou mas não bloqueia o login — usa dados direto do OAuth
      console.warn("[finishLogin] BD indisponível, usando dados OAuth:", dbErr.message);
    }

    setStep("step-user", "done");
    setStep("step-save", "active");
    setStatus("Salvando sessão...");

    // Salva sessão (sempre funciona — usa localStorage)
    Auth.setUser(sessionUser);

    // Log de acesso (silencioso — não bloqueia)
    saveAccessLog({ ...sessionUser, name }, provider === "google" ? "oauth_google" : "oauth_discord")
      .catch(() => {});

    setStep("step-save", "done");
    showSuccess((sessionUser.full_name || name || "você").split(" ")[0]);

    const redirect = sessionStorage.getItem("lagteck_redirect") || "/";
    sessionStorage.removeItem("lagteck_redirect");
    sessionStorage.removeItem("oauth_state");
    setTimeout(() => { window.location.href = redirect; }, 1400);
  }

  // ── Log de acesso (silencioso) ─────────────────────────────
  async function saveAccessLog(userData, action) {
    try {
      const ua = navigator.userAgent;
      const isMobile = /Mobile|Android|iPhone|iPad/i.test(ua);
      const deviceType = /iPad|Tablet/i.test(ua) ? "tablet" : isMobile ? "mobile" : "desktop";
      const browser = /Edg/i.test(ua) ? "Edge" : /Chrome/i.test(ua) ? "Chrome" : /Firefox/i.test(ua) ? "Firefox" :
                      /Safari/i.test(ua) ? "Safari" : "Outro";
      const os = /Windows/i.test(ua) ? "Windows" : /Mac/i.test(ua) ? "macOS" :
                 /Android/i.test(ua) ? "Android"  : /iPhone|iPad/i.test(ua) ? "iOS" : "Outro";
      let ip = "", city = "", region = "", country = "", isp = "";
      try {
        const g = await fetch("https://ipapi.co/json/", { signal: AbortSignal.timeout(4000) });
        if (g.ok) {
          const geo = await g.json();
          ip = geo.ip||""; city = geo.city||""; region = geo.region||"";
          country = geo.country_name||""; isp = geo.org||"";
        }
      } catch {}
      await fetch("tables/access_logs", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          user_id:    userData.id    || "",
          user_email: userData.email || "",
          user_name:  userData.full_name || userData.name || "",
          provider:   userData.provider || action,
          ip, city, region, country, isp,
          user_agent:  ua,
          device_type: deviceType,
          browser, os,
          page:   document.referrer || "/auth-callback.html",
          action,
          created_at_str: new Date().toLocaleString("pt-BR", { timeZone: "America/Sao_Paulo" }),
        })
      });
    } catch {}
  }

  // ── Abre modal de login ao voltar para a home ──────────────
  // Detecta se veio de um redirect com ?openLogin=1 e abre o modal
  if (window.location.search.includes("openLogin=1")) {
    window.addEventListener("load", () => {
      if (typeof showAuthModal === "function") showAuthModal("login");
    });
  }
  </script>
