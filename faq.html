<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FAQ — Perguntas Frequentes — Deal Blox</title>
  <link rel="icon" href="/images/logo-dealblox.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .legal-hero { background:linear-gradient(135deg,#060d2a,#0f1535); border-radius:var(--r3); border:1px solid var(--border2); padding:32px; text-align:center; margin-bottom:24px; }
    .legal-hero h1 { font-size:28px; font-weight:900; color:var(--white); margin-top:8px; }
    .legal-hero p { font-size:13px; color:var(--text2); margin-top:6px; }
    #faq-search { width:100%; padding:12px 16px 12px 44px; border:1px solid var(--border2); border-radius:var(--r2); font-size:14px; background:var(--bg3); font-family:var(--font); color:var(--white); outline:none; transition:var(--t); }
    #faq-search:focus { border-color:var(--cyan); }
    #faq-search::placeholder { color:var(--text3); }
  </style>
</head>
<body>
  <div id="topbar-root"></div>
  <div id="header-root"></div>
  <div id="mobile-nav-root"></div>
  <div id="auth-modal-root"></div>

  <div style="max-width:800px;margin:0 auto;padding:32px 24px 64px">

    <div class="legal-hero" style="background:linear-gradient(135deg,#1e3a8a,#2563eb)">
      <div style="font-size:48px;margin-bottom:12px">❓</div>
      <h1>Perguntas Frequentes</h1>
      <p>Encontre respostas para as dúvidas mais comuns sobre a Deal Blox</p>
    </div>

    <!-- BUSCA FAQ -->
    <div style="margin-bottom:24px;position:relative">
      <svg width="18" height="18" fill="none" stroke="var(--gray-400)" stroke-width="2" viewBox="0 0 24 24" style="position:absolute;left:14px;top:50%;transform:translateY(-50%)"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="faq-search" placeholder="Buscar pergunta..." oninput="filterFAQ()" style="width:100%;padding:13px 16px 13px 44px;border:1.5px solid var(--gray-200);border-radius:var(--radius-xl);font-size:14px;background:white;font-family:var(--font);color:var(--gray-700);transition:all .2s">
    </div>

    <!-- CATEGORIAS -->
    <div style="display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap">
      <button class="faq-cat active" data-cat="all" onclick="filterByCat('all', this)">Todas</button>
      <button class="faq-cat" data-cat="compras" onclick="filterByCat('compras', this)">🛒 Compras</button>
      <button class="faq-cat" data-cat="entrega" onclick="filterByCat('entrega', this)">📦 Entrega</button>
      <button class="faq-cat" data-cat="pagamento" onclick="filterByCat('pagamento', this)">💳 Pagamento</button>
      <button class="faq-cat" data-cat="conta" onclick="filterByCat('conta', this)">👤 Conta</button>
      <button class="faq-cat" data-cat="reembolso" onclick="filterByCat('reembolso', this)">↩️ Reembolso</button>
    </div>

    <div id="faq-container"></div>

    <!-- AINDA TEM DÚVIDAS -->
    <div style="background:linear-gradient(135deg,#5865F2,#7289da);border-radius:var(--radius-xl);padding:32px;text-align:center;color:white;margin-top:40px">
      <div style="font-size:40px;margin-bottom:12px">💬</div>
      <h2 style="font-size:1.2rem;font-weight:800;margin-bottom:8px">Ainda tem dúvidas?</h2>
      <p style="font-size:14px;opacity:.85;margin-bottom:20px">Nossa equipe está no Discord para te ajudar!</p>
      <a href="https://discord.gg/rPFN7BMC5k" target="_blank" style="background:white;color:#5865F2;padding:12px 28px;border-radius:var(--radius-xl);font-weight:700;font-size:14px;text-decoration:none;display:inline-flex;align-items:center;gap:8px">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/></svg>
        Abrir Ticket no Discord
      </a>
    </div>
  </div>

  <div id="footer-root"></div>

  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <script src="/js/config.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/layout.js"></script>
  <script>
    document.getElementById("topbar-root").innerHTML = renderTopbar();
    document.getElementById("header-root").innerHTML = renderHeader();
    document.getElementById("mobile-nav-root").innerHTML = renderMobileNav();
    document.getElementById("auth-modal-root").innerHTML = renderAuthModal();
    document.getElementById("footer-root").innerHTML = renderFooter();
    initMobileMenu();

    const faqs = [
      { cat: "compras", q: "Como faço para comprar na Deal Blox?", a: "Basta navegar pelos produtos (Contas ou Frutas), clicar em 'Ver Detalhes' no produto desejado e depois em 'Comprar Agora'. Você precisará de uma conta no site para finalizar a compra." },
      { cat: "conta", q: "Preciso criar uma conta para comprar?", a: "Sim, é necessário ter uma conta cadastrada na Deal Blox para realizar compras, salvar favoritos, ver histórico de pedidos e acessar o carrinho. O cadastro é gratuito e rápido." },
      { cat: "conta", q: "Como crio uma conta na Deal Blox?", a: "Clique em 'Entrar' no topo da página, depois em 'Criar conta'. Preencha seu nome completo, e-mail e senha. Um código de verificação será enviado para seu e-mail. Insira o código para ativar a conta." },
      { cat: "conta", q: "Posso entrar com Google ou Discord?", a: "Sim! Oferecemos login social via Google e Discord para facilitar o acesso. Basta clicar no botão correspondente na tela de login." },
      { cat: "conta", q: "Esqueci minha senha. Como recuperar?", a: "Na tela de login, clique em 'Esqueci minha senha'. Digite seu e-mail cadastrado, um código de verificação será enviado. Após verificar o código, você poderá criar uma nova senha." },
      { cat: "pagamento", q: "Quais formas de pagamento são aceitas?", a: "Aceitamos PIX (aprovação imediata) e Cartão de Crédito/Débito (todas as bandeiras principais). Todos os pagamentos são processados com segurança pelo Mercado Pago." },
      { cat: "pagamento", q: "O pagamento é seguro?", a: "Sim! Todos os pagamentos são processados pelo Mercado Pago, uma das maiores e mais seguras plataformas de pagamento do Brasil. A Deal Blox não armazena dados de cartão ou PIX." },
      { cat: "pagamento", q: "Por que o PIX é recomendado?", a: "O PIX tem aprovação instantânea, o que acelera a entrega do produto. Com cartão, pode haver um breve tempo de análise. Para a experiência mais rápida, use o PIX." },
      { cat: "entrega", q: "Como funciona a entrega dos produtos?", a: "Após a confirmação do pagamento, você receberá um ID único de entrega (ex: LT-XXXXXXXX). Use este ID para abrir um ticket no nosso Discord e retirar seu produto." },
      { cat: "entrega", q: "Quanto tempo demora a entrega?", a: "Com PIX: entrega em minutos após confirmação do pagamento. Com cartão: pode levar de alguns minutos a horas dependendo da análise. Nossa equipe está ativa 24h para atendimento." },
      { cat: "entrega", q: "Como acesso o Discord para retirar o produto?", a: "Entre em discord.gg/rPFN7BMC5k, leia as regras do servidor e abra um ticket na seção de suporte. Informe seu ID de compra ao atendente. O produto será entregue por lá." },
      { cat: "entrega", q: "Perdi meu ID de compra. O que fazer?", a: "O ID de compra fica registrado no seu histórico de pedidos (acessível pelo seu perfil no site). Acesse 'Meu Perfil' → 'Pedidos' para encontrá-lo. Em caso de dificuldade, abra um ticket no Discord com seu e-mail de cadastro." },
      { cat: "reembolso", q: "Posso pedir reembolso?", a: "Depende do produto: Para CONTAS, o reembolso é permitido em até 15 minutos após a confirmação do pagamento. Para FRUTAS e itens virtuais, não há reembolso após o recebimento. Em ambos os casos, o reembolso deve ser solicitado via ticket no Discord." },
      { cat: "reembolso", q: "Como solicitar reembolso de uma conta?", a: "Abra um ticket no Discord em até 15 minutos após a confirmação do pagamento. Informe o ID do pedido e o motivo. Nossa equipe processará o reembolso em até 24 horas após aprovação." },
      { cat: "compras", q: "Os produtos têm garantia?", a: "As contas possuem garantia de integridade no momento da entrega (acesso funcional, dados corretos). Após a entrega e confirmação, eventuais problemas causados por uso indevido ou ações externas não são cobertos." },
      { cat: "compras", q: "Os itens são legítimos?", a: "Sim, todos os produtos são obtidos de forma legítima dentro do jogo. Porém, ressaltamos que a Deal Blox não possui afiliação com a Roblox Corporation, e o uso de contas/itens de terceiros pode violar os termos do jogo." },
      { cat: "conta", q: "Como personalizar meu perfil?", a: "Acesse 'Meu Perfil' clicando no seu avatar no canto superior direito (ou pela sidebar). Lá você pode editar seu nome de exibição e visualizar suas compras." },
      { cat: "compras", q: "O estoque é atualizado em tempo real?", a: "Sim! O estoque exibido em cada produto é atualizado em tempo real. Quando um produto é comprado, o estoque é decrementado automaticamente." },
    ];

    let activeCat = "all";

    function filterByCat(cat, btn) {
      activeCat = cat;
      document.querySelectorAll(".faq-cat").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      renderFAQ();
    }

    function filterFAQ() { renderFAQ(); }

    function renderFAQ() {
      const q = document.getElementById("faq-search").value.toLowerCase();
      const filtered = faqs.filter(f => {
        const matchCat = activeCat === "all" || f.cat === activeCat;
        const matchSearch = !q || f.q.toLowerCase().includes(q) || f.a.toLowerCase().includes(q);
        return matchCat && matchSearch;
      });

      const container = document.getElementById("faq-container");
      if (!filtered.length) {
        container.innerHTML = `<div style="text-align:center;padding:40px;color:var(--gray-400)"><div style="font-size:40px;margin-bottom:12px">🔍</div><h3>Nenhuma pergunta encontrada</h3><p>Tente outros termos ou acesse o Discord para ajuda.</p></div>`;
        return;
      }
      container.innerHTML = filtered.map((f, i) => `
        <div class="faq-item" data-index="${i}">
          <button class="faq-question" onclick="toggleFAQ(this)">
            ${f.q}
            <svg class="faq-chevron" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
          </button>
          <div class="faq-answer">${f.a}</div>
        </div>`).join("");
    }

    function toggleFAQ(btn) {
      btn.classList.toggle("active");
      const answer = btn.nextElementSibling;
      answer.classList.toggle("open");
    }

    renderFAQ();
  </script>
  <style>
    .faq-cat { padding:7px 16px;border:1.5px solid var(--gray-200);border-radius:var(--radius-xl);background:var(--white);font-size:13px;font-weight:500;color:var(--gray-600);cursor:pointer;transition:all .2s; }
    .faq-cat:hover { border-color:var(--blue-300);color:var(--blue-600); }
    .faq-cat.active { border-color:var(--blue-600);background:var(--blue-600);color:white; }
    #faq-search:focus { outline:none;border-color:var(--blue-500);box-shadow:0 0 0 3px rgba(59,130,246,.1); }
  </style>
</body>
</html>
