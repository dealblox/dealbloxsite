    function getIcon() { return ICONS[Math.floor(Math.random()*ICONS.length)]; }

    function rarityColor(rarity = '') {
      const r = rarity.toLowerCase();
      if (r.includes('mítica') || r.includes('mitica')) return { bg: 'rgba(239,68,68,.15)', color: '#ef4444', border: 'rgba(239,68,68,.3)' };
      if (r.includes('lendár') || r.includes('lendari')) return { bg: 'rgba(245,158,11,.15)', color: '#f59e0b', border: 'rgba(245,158,11,.3)' };
      if (r.includes('épica') || r.includes('epica')) return { bg: 'rgba(139,92,246,.15)', color: '#8b5cf6', border: 'rgba(139,92,246,.3)' };
      if (r.includes('rara')) return { bg: 'rgba(59,130,246,.15)', color: '#3b82f6', border: 'rgba(59,130,246,.3)' };
      return { bg: 'rgba(100,116,139,.15)', color: '#64748b', border: 'rgba(100,116,139,.3)' };
    }

    function createCard(p) {
      const favs = JSON.parse(localStorage.getItem('lt_favs') || '[]');
      const isFav = favs.includes(p.id);

      const inStock = (p.stock ?? 1) > 0;
      const stockLow = inStock && p.stock <= 3;
      const rc = rarityColor(p.rarity || '');
      const icon = getIcon();
      return `
      <div class="product-card" onclick="window.location='/produto.html?id=${p.id}'">
        <div class="product-card-img">
          ${p.image_url
            ? `<img class="product-card-img-inner" src="${p.image_url}" alt="${p.name}" onerror="this.parentElement.innerHTML='<div class=\\'product-card-placeholder\\'><span class=\\'placeholder-icon\\'>${icon}</span></div>'">`
            : `<div class="product-card-placeholder"><span class="placeholder-icon">${icon}</span></div>`
          }
          <div class="product-card-img-overlay"></div>
          ${hasDiscount ? `<span class="badge-sale">-${pctOff}%</span>` : ''}
          ${p.is_new ? `<span class="badge-new">NOVO</span>` : ''}
          <button class="btn-fav ${isFav?'active':''}" onclick="toggleFav(event,'${p.id}')" title="Favoritar">
            <svg width="14" height="14" fill="${isFav?'currentColor':'none'}" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
          </button>
        </div>
        <div class="product-card-body">
          <div class="product-card-name">${p.name}</div>
          <div class="product-card-meta">
            ${p.rarity ? `<span class="rarity-badge" style="background:${rc.bg};color:${rc.color};border:1px solid ${rc.border}">${p.rarity}</span>` : ''}
          </div>
          <div class="product-card-stock ${inStock?(stockLow?'stock-low':'stock-in'):'stock-out'}">
            ${inStock?(stockLow?`Restam ${p.stock}`:'Em estoque'):'Sem estoque'}
          </div>
          <div class="product-card-price">
            <span class="price-current">${formatPrice(p.price)}</span>
            ${hasDiscount?`<span class="price-original">${formatPrice(p.original_price)}</span>`:''}
            ${p.pix_discount?`<span class="price-pix">PIX -${p.pix_discount}%</span>`:''}
          </div>
          <button class="btn-view-details" onclick="window.location='/produto.html?id=${p.id}';event.stopPropagation()">Ver Detalhes →</button>
        </div>

      e.stopPropagation();
      let favs = JSON.parse(localStorage.getItem('lt_favs') || '[]');
      const idx = favs.indexOf(id);
      if (idx >= 0) favs.splice(idx, 1); else favs.push(id);
      localStorage.setItem('lt_favs', JSON.stringify(favs));
      e.currentTarget.classList.toggle('active', idx < 0);
      const svg = e.currentTarget.querySelector('svg');
      if (svg) svg.setAttribute('fill', idx < 0 ? 'currentColor' : 'none');
      try {
        const user = Auth.getUser();
        if (user && user.id) await API.patch('users', user.id, { favorites: favs });
      } catch(err) { console.warn('Fav sync:', err); }
    }

    let allProducts = [];
    let currentFilter = 'all';

    function setFilter(f, btn) {
      currentFilter = f;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      if (btn) btn.classList.add('active');
      renderFiltered();
    }

    function renderFiltered() {
      const query = document.getElementById('search-input')?.value.toLowerCase() || '';
      const sort = document.getElementById('sort-select')?.value || '';
      let list = [...allProducts];
      if (currentFilter === 'instock') list = list.filter(p => (p.stock ?? 1) > 0);
      if (currentFilter === 'sale') list = list.filter(p => p.original_price && p.original_price > p.price);
      if (query) list = list.filter(p => p.name?.toLowerCase().includes(query));
      if (sort === 'price-asc') list.sort((a,b) => a.price - b.price);
      if (sort === 'price-desc') list.sort((a,b) => b.price - a.price);
      if (sort === 'stock-desc') list.sort((a,b) => (b.stock||0) - (a.stock||0));

      const grid = document.getElementById('products-grid');
      const count = document.getElementById('product-count');
      if (count) count.innerHTML = `<strong>${list.length}</strong> produto(s)`;

      if (!list.length) {
        grid.innerHTML = `<div class="empty-state"><div class="empty-state-icon">🔍</div><h3>Nenhum resultado</h3><p>Tente outro filtro ou busca.</p></div>`;
        return;
      }
      grid.innerHTML = list.map(createCard).join('');
    }

    const SUPABASE_URL = "https://piqnqegawcdhykatpflj.supabase.co";
    const SUPABASE_KEY = "sb_publishable_mGMkvi5A0S3iVySpI_ek_Q_IFekBWjH";

    async function loadProducts() {
      const grid = document.getElementById('products-grid');
      try {
        const params = new URLSearchParams(window.location.search);
        const q = params.get('q') || '';
        if (q) { const si = document.getElementById('search-input'); if(si) si.value = q; }

        grid.innerHTML = '<div class="spinner"></div>';

        let produtos = [];

        // 1ª tentativa: Supabase (fonte principal)
        // CORRIGIDO: tabela "produtos", coluna "categoria", campos em português
        try {
          let res = await fetch(
            `${SUPABASE_URL}/rest/v1/products?select=*&category=eq.frutas`,
            {
              headers: {
                "apikey": SUPABASE_KEY,
                "Authorization": `Bearer ${SUPABASE_KEY}`
              }
            }
          );
          if (res.ok) {
            const sbData = await res.json();
            console.log('[frutas] Supabase retornou:', sbData.length, 'produtos');
            if (Array.isArray(sbData) && sbData.length > 0) {
              // Normaliza campos do Supabase (português) para o formato interno (inglês)
              produtos = sbData.map(p => ({
                ...p,
                name:           p.nome          ?? p.name,
                price:          p.preco         ?? p.price,
                original_price: p.preco_original ?? p.original_price,
                stock:          p.estoque       ?? p.stock ?? 1,
                category:       p.categoria     ?? p.category,
                active:         p.active !== false,
              }));
            }
          } else {
            console.warn('[frutas] Supabase retornou HTTP', res.status);
          }
        } catch(sbErr) {
          console.warn('[frutas] Supabase indisponível:', sbErr.message);
        }

        // 2ª tentativa: API interna (fallback)
        if (produtos.length === 0) {
          let res = await fetch('tables/products?limit=200&sort=created_at');
          if (!res.ok) throw new Error(`API interna HTTP ${res.status}`);
          const data = await res.json();
          produtos = (data.data || []).filter(p => {
            const cat = (p.category || p.categoria || '').toLowerCase();
            return (cat === 'fruits' || cat === 'frutas' || cat === 'fruit');
          });
        }

        // Filtra apenas ativos
        allProducts = produtos.filter(p => p.active !== false && p.status !== 'inactive');
        console.log('[frutas] Total após filtro:', allProducts.length, 'frutas');

        // Sincroniza favoritos do banco
        try {
          const user = Auth.getUser();
          if (user && user.id) {
            const dbUser = await API.getOne('users', user.id);
            if (dbUser && Array.isArray(dbUser.favorites) && dbUser.favorites.length > 0) {
              localStorage.setItem('lt_favs', JSON.stringify(dbUser.favorites));
            }
          }
        } catch(e) {}

        renderFiltered();

      } catch(err) {
        console.error('[frutas] Erro ao carregar produtos:', err);
        grid.innerHTML = `<div class="empty-state"><div class="empty-state-icon">⚠️</div><h3>Erro ao carregar</h3><p>Tente recarregar a página.<br><small style="color:#4a5568">${err.message}</small></p><button onclick="loadProducts()" style="margin-top:16px;background:var(--grad-btn);color:#fff;border:none;border-radius:10px;padding:10px 24px;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font)">Tentar novamente</button></div>`;
      }
    }

    document.getElementById('search-input')?.addEventListener('input', renderFiltered);
    document.getElementById('sort-select')?.addEventListener('change', renderFiltered);

    loadProducts();
  </script>
</body>
</html>
