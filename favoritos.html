<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Favoritos — Deal Blox</title>
  <link rel="icon" href="/images/logo-dealblox.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .fav-empty { text-align:center; padding:60px 20px; }
    .fav-empty .icon { font-size:64px; margin-bottom:16px; }
    .fav-empty h3 { font-size:1.2rem; font-weight:700; color:var(--white); margin-bottom:8px; }
    .fav-empty p { font-size:13px; color:var(--text2); }
    .fav-count { font-size:13px; color:var(--text2); font-weight:600; margin-bottom:20px; }
    .fav-count strong { color:var(--cyan2); }
  </style>
</head>
<body>
  <div id="topbar-root"></div>
  <div id="header-root"></div>
  <div id="mobile-nav-root"></div>
  <div id="auth-modal-root"></div>
  <div class="page-layout">
    <div id="sidebar-root"></div>
    <main class="main-content">
      <h1 style="font-size:1.3rem;font-weight:800;margin-bottom:6px">❤️ Meus Favoritos</h1>
      <div class="fav-count" id="fav-count"></div>
      <div class="products-grid" id="favs-grid">
        <div class="spinner" style="margin:40px auto"></div>
      </div>
    </main>
  </div>
  <div id="footer-root"></div>
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <script src="/js/config.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/layout.js"></script>
  <script>
    // ── Fallback inline ──────────────────────────────────────────────────
    if (typeof LAGTECK_CONFIG === 'undefined') { window.LAGTECK_CONFIG = {MP_PUBLIC_KEY:"",EMAILJS_SERVICE_ID:"service_mzmityx",EMAILJS_TEMPLATE_ID:"template_6ztpr7k",EMAILJS_PUBLIC_KEY:"7SAN7fAAsYLc7e-6W",DISCORD_SERVER:"https://discord.gg/rPFN7BMC5k",SITE_NAME:"Deal Blox"}; }
    if (typeof Auth === 'undefined') { window.Auth = { STORAGE_KEY:"lagteck_user", getUser(){try{return JSON.parse(localStorage.getItem(this.STORAGE_KEY))||null}catch{return null}}, setUser(u){localStorage.setItem(this.STORAGE_KEY,JSON.stringify(u))}, logout(){localStorage.removeItem(this.STORAGE_KEY);window.location.href="/"}, isLoggedIn(){return!!this.getUser()} }; }
    if (typeof Cart === 'undefined') { window.Cart = { STORAGE_KEY:"lagteck_cart", getItems(){try{return JSON.parse(localStorage.getItem(this.STORAGE_KEY))||[]}catch{return[]}}, getCount(){return this.getItems().reduce((a,i)=>a+(i.qty||1),0)}, addItem(p){const items=this.getItems();const ex=items.find(i=>i.id===p.id);if(ex)ex.qty=(ex.qty||1)+1;else items.push({...p,qty:1});localStorage.setItem(this.STORAGE_KEY,JSON.stringify(items));return items}, removeItem(id){const items=this.getItems().filter(i=>i.id!==id);localStorage.setItem(this.STORAGE_KEY,JSON.stringify(items));return items}, clear(){localStorage.removeItem(this.STORAGE_KEY)}, getTotal(){return this.getItems().reduce((a,i)=>a+(i.price*(i.qty||1)),0)} }; }
    if (typeof API === 'undefined') { window.API = { async get(t,p={}){const qs=new URLSearchParams(p).toString();const res=await fetch(`tables/${t}${qs?"?"+qs:""}`);return res.json()}, async getOne(t,id){const res=await fetch(`tables/${t}/${id}`);if(!res.ok)return null;return res.json()}, async post(t,d){const res=await fetch(`tables/${t}`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(d)});return res.json()}, async patch(t,id,d){const res=await fetch(`tables/${t}/${id}`,{method:"PATCH",headers:{"Content-Type":"application/json"},body:JSON.stringify(d)});return res.json()} }; }
    if (typeof formatPrice === 'undefined') { window.formatPrice = (v) => new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'}).format(v); }
    if (typeof showToast === 'undefined') { window.showToast=(msg,type='success',dur=3500)=>{let c=document.getElementById('toast-container');if(!c){c=document.createElement('div');c.id='toast-container';c.style.cssText='position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:10px';document.body.appendChild(c)}const t=document.createElement('div');const bc={success:'#10b981',error:'#ef4444',info:'#3b82f6',warning:'#f59e0b'};t.style.cssText=`background:#0f1320;color:#c8d8f0;padding:14px 18px;border-radius:12px;font-size:13px;font-weight:600;display:flex;align-items:center;gap:10px;min-width:260px;max-width:380px;border-left:4px solid ${bc[type]||bc.info};box-shadow:0 8px 40px rgba(0,0,0,.6)`;t.innerHTML=`<span>${msg}</span><button onclick="this.parentElement.remove()" style="background:none;border:none;cursor:pointer;color:#4a5568;font-size:16px;margin-left:auto">×</button>`;c.appendChild(t);setTimeout(()=>t.remove(),dur)}; }
    if (typeof showAuthModal === 'undefined') { window.showAuthModal=(t='login')=>{const m=document.getElementById('auth-modal');if(m){m.style.display='flex';document.body.style.overflow='hidden'}};window.closeAuthModal=()=>{const m=document.getElementById('auth-modal');if(m){m.style.display='none';document.body.style.overflow=''}}; }
    if (typeof renderTopbar === 'undefined') {
      window.renderTopbar=()=>`<div class="topbar"><span class="topbar-dot"></span>⚡ Entrega rápida via Discord &nbsp;·&nbsp; <a href="https://discord.gg/rPFN7BMC5k" target="_blank">Entrar no servidor ✨</a></div>`;
      window.renderHeader=()=>{const user=Auth.getUser();const cc=Cart.getCount();return`<header class="site-header"><div class="header-inner"><button class="mobile-menu-btn" id="mobile-menu-btn"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button><a href="/" class="logo"><img src="/images/logo-dealblox.png" alt="Deal Blox" style="width:32px;height:32px;border-radius:8px;object-fit:cover"><span class="logo-text">Deal Blox</span></a><nav class="header-nav"><a href="/contas.html">Contas</a><a href="/frutas.html">Frutas</a><a href="/gamepass.html">Gamepass</a></nav><div class="header-search"><svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg><input type="text" id="header-search-input" placeholder="Buscar produtos..." autocomplete="off"></div><div class="header-actions"><a href="/carrinho.html" class="header-btn" style="position:relative"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg><span class="cart-badge" style="display:${cc>0?'flex':'none'}">${cc}</span></a>${user?`<a href="/perfil.html" class="header-btn" style="padding:3px"><div class="sidebar-avatar" style="width:28px;height:28px;font-size:12px;border-radius:6px">${(user.full_name?.[0]||'U').toUpperCase()}</div></a>`:`<button class="btn-login" onclick="showAuthModal('login')">Entrar</button>`}</div></div></header>`};
      window.renderSidebar=(a='')=>`<aside class="sidebar"><span class="sidebar-section-label">Loja</span><a href="/" class="sidebar-item ${a==='inicio'?'active':''}">🏠 Início</a><a href="/contas.html" class="sidebar-item ${a==='contas'?'active':''}">👤 Contas Blox</a><a href="/frutas.html" class="sidebar-item ${a==='frutas'?'active':''}">🛡️ Frutas</a><span class="sidebar-section-label">Conta</span><a href="/perfil.html" class="sidebar-item ${a==='perfil'?'active':''}">👤 Perfil</a><a href="/favoritos.html" class="sidebar-item ${a==='favoritos'?'active':''}">❤️ Favoritos</a><a href="/mensagens.html" class="sidebar-item ${a==='mensagens'?'active':''}">💬 Mensagens</a></aside>`;
      window.renderMobileNav=(a='')=>`<div class="mobile-nav-overlay" id="mobile-nav-overlay" onclick="closeMobileNav()"></div><div class="mobile-nav" id="mobile-nav"><div class="mobile-nav-header"><a href="/" class="logo"><span class="logo-text">Deal Blox</span></a><button class="mobile-nav-close" onclick="closeMobileNav()">✕</button></div><a href="/" class="mobile-nav-item">🏠 Início</a><a href="/contas.html" class="mobile-nav-item">👤 Contas</a><a href="/frutas.html" class="mobile-nav-item">🛡️ Frutas</a><div class="mobile-nav-btns"><button onclick="showAuthModal('login');closeMobileNav()" class="btn-mobile-login">Entrar</button></div></div>`;
      window.renderFooter=()=>`<footer class="site-footer"><div class="footer-inner"><div class="footer-bottom"><p>© 2026 Deal Blox.</p></div></div></footer>`;
      window.renderAuthModal=()=>`<div class="modal-overlay" id="auth-modal" style="display:none"><div class="modal-box"><button class="modal-close" onclick="closeAuthModal()">✕</button><p style="color:var(--white);text-align:center;padding:20px">Faça login em <a href="/" style="color:var(--cyan2)">lagteck.vercel.app</a></p></div></div>`;
      window.initMobileMenu=()=>{document.getElementById('mobile-menu-btn')?.addEventListener('click',()=>{document.getElementById('mobile-nav')?.classList.add('open');document.getElementById('mobile-nav-overlay')?.classList.add('open')})};
      window.closeMobileNav=()=>{document.getElementById('mobile-nav')?.classList.remove('open');document.getElementById('mobile-nav-overlay')?.classList.remove('open')};
    }

    document.getElementById("topbar-root").innerHTML = renderTopbar();
    document.getElementById("header-root").innerHTML = renderHeader();
    document.getElementById("sidebar-root").innerHTML = renderSidebar("favoritos");
    document.getElementById("mobile-nav-root").innerHTML = renderMobileNav("favoritos");
    document.getElementById("auth-modal-root").innerHTML = renderAuthModal();
    document.getElementById("footer-root").innerHTML = renderFooter();
    initMobileMenu();

    const ICONS_FAV = ["🗡️","⚔️","🏆","👑","🛡️","🔮","💫","⚡","🍎","🍇","🌀","🔥"];

    function getFavIcon(name) {
      return ICONS_FAV[(name||'').length % ICONS_FAV.length];
    }

    function rarityColor(rarity) {
      const r = (rarity||'').toLowerCase();
      if(r.includes('mítica')||r.includes('mitica')) return {bg:'rgba(239,68,68,.15)',color:'#ef4444',border:'rgba(239,68,68,.3)'};
      if(r.includes('lendár')||r.includes('lendari')) return {bg:'rgba(245,158,11,.15)',color:'#f59e0b',border:'rgba(245,158,11,.3)'};
      if(r.includes('épica')||r.includes('epica'))   return {bg:'rgba(139,92,246,.15)',color:'#8b5cf6',border:'rgba(139,92,246,.3)'};
      if(r.includes('rara'))                         return {bg:'rgba(59,130,246,.15)',color:'#3b82f6',border:'rgba(59,130,246,.3)'};
      return {bg:'rgba(100,116,139,.15)',color:'#64748b',border:'rgba(100,116,139,.3)'};
    }

    async function loadFavs() {
      const grid      = document.getElementById("favs-grid");
      const countEl   = document.getElementById("fav-count");

      // Carrega favoritos: banco (se logado) tem prioridade
      let favIds = [];
      try {
        const user = Auth.getUser();
        if (user && user.id) {
          const dbUser = await API.getOne('users', user.id).catch(() => null);
          if (dbUser && Array.isArray(dbUser.favorites) && dbUser.favorites.length > 0) {
            favIds = dbUser.favorites;
            localStorage.setItem('lt_favs', JSON.stringify(favIds));
          } else {
            favIds = JSON.parse(localStorage.getItem('lt_favs') || '[]');
          }
        } else {
          favIds = JSON.parse(localStorage.getItem('lt_favs') || '[]');
        }
      } catch(e) {
        favIds = JSON.parse(localStorage.getItem('lt_favs') || '[]');
      }

      if (!favIds.length) {
        countEl.textContent = '';
        grid.innerHTML = `
          <div class="fav-empty" style="grid-column:1/-1">
            <div class="icon">💔</div>
            <h3>Nenhum favorito ainda</h3>
            <p>Clique no ❤️ nos produtos para adicionar aos favoritos.</p>
            <a href="/" style="display:inline-block;margin-top:16px;padding:10px 24px;background:var(--grad-btn);color:white;border-radius:var(--r);font-weight:700;text-decoration:none;font-family:var(--font)">Explorar produtos</a>
          </div>`;
        return;
      }

      countEl.innerHTML = `<strong>${favIds.length}</strong> produto${favIds.length!==1?'s':''} favorita${favIds.length!==1?'dos':'do'}`;

      try {
        // Busca produtos
        const res = await API.get("products", { limit: 200 });
        const all = res.data || [];
        const products = all.filter(p => favIds.includes(p.id));

        if (!products.length) {
          grid.innerHTML = `
            <div class="fav-empty" style="grid-column:1/-1">
              <div class="icon">🔍</div>
              <h3>Produtos não encontrados</h3>
              <p>Os favoritos podem ter sido removidos da loja.</p>
              <button onclick="clearFavs()" style="margin-top:16px;padding:10px 24px;border:1px solid var(--red);color:var(--red);background:none;border-radius:var(--r);font-weight:700;cursor:pointer;font-family:var(--font)">Limpar favoritos</button>
            </div>`;
          return;
        }

        grid.innerHTML = products.map(p => {
          const icon     = getFavIcon(p.name);
          const inStock  = (p.stock ?? 1) > 0;
          const discount = p.original_price > p.price ? Math.round((1 - p.price / p.original_price) * 100) : 0;
          const rc       = rarityColor(p.rarity || '');
          return `
          <div class="product-card" style="cursor:pointer" onclick="window.location.href='/produto.html?id=${p.id}'">
            <div class="product-card-img">
              ${p.image_url
                ? `<img src="${p.image_url}" alt="${p.name}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=\\'product-card-placeholder\\'><span class=\\'placeholder-icon\\'>${icon}</span></div>'">`
                : `<div class="product-card-placeholder"><span class="placeholder-icon">${icon}</span></div>`}
              <div class="product-card-img-overlay"></div>
              <button class="btn-fav active" onclick="removeFav(event,'${p.id}')" title="Remover favorito">
                <svg width="14" height="14" fill="currentColor" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
              </button>
              ${discount > 0 ? `<span class="badge-sale">-${discount}%</span>` : ''}
            </div>
            <div class="product-card-body">
              <div class="product-card-name">${p.name}</div>
              <div class="product-card-meta">
                ${p.rarity ? `<span class="rarity-badge" style="background:${rc.bg};color:${rc.color};border:1px solid ${rc.border}">${p.rarity}</span>` : ''}
              </div>
              <div class="product-card-stock ${inStock ? 'stock-in' : 'stock-out'}">${inStock ? 'Em estoque' : 'Sem estoque'}</div>
              <div class="product-card-price">
                <span class="price-current">${formatPrice(p.price)}</span>
                ${p.original_price > p.price ? `<span class="price-original">${formatPrice(p.original_price)}</span>` : ''}
              </div>
              <button class="btn-view-details" onclick="window.location.href='/produto.html?id=${p.id}';event.stopPropagation()" ${!inStock ? 'disabled style="opacity:.5;cursor:not-allowed"' : ''}>
                Ver Detalhes →
              </button>
            </div>
          </div>`;
        }).join("");

      } catch(err) {
        console.error('[favoritos]', err);
        grid.innerHTML = `
          <div class="fav-empty" style="grid-column:1/-1">
            <div class="icon">⚠️</div>
            <h3>Erro ao carregar favoritos</h3>
            <p>Tente recarregar a página.</p>
            <button onclick="loadFavs()" style="margin-top:16px;padding:10px 24px;background:var(--grad-btn);color:#fff;border:none;border-radius:var(--r);font-weight:700;cursor:pointer;font-family:var(--font)">Tentar novamente</button>
          </div>`;
      }
    }

    async function removeFav(e, id) {
      e.stopPropagation();
      // Remove do localStorage
      let favs = JSON.parse(localStorage.getItem('lt_favs') || '[]');
      favs = favs.filter(f => f !== id);
      localStorage.setItem('lt_favs', JSON.stringify(favs));

      // Sincroniza com banco se logado
      try {
        const user = Auth.getUser();
        if (user && user.id) {
          await API.patch('users', user.id, { favorites: favs });
        }
      } catch(err) { console.warn('Fav sync:', err); }

      showToast("Removido dos favoritos", "info");
      loadFavs();
    }

    async function clearFavs() {
      localStorage.removeItem('lt_favs');
      try {
        const user = Auth.getUser();
        if (user && user.id) await API.patch('users', user.id, { favorites: [] });
      } catch(e) {}
      loadFavs();
    }

    loadFavs();
  </script>
</body>
</html>
